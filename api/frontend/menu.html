<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee House — Меню</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .menu-item {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 12px;
        margin-bottom: 15px;
        transition: transform 0.3s ease;
      }

      .menu-item:hover {
        transform: scale(1.02);
      }

      .menu-card {
        margin-bottom: 30px;
        padding: 15px;
        border: 1px solid #f0f0f0;
      }
    </style>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="#">☕️ COFFEE HOUSE</a>
      </div>
    </nav>

    <div class="container">
      <h2 class="mb-4">Наше меню</h2>
      <div id="menu-container" class="row g-4"></div>
    </div>

    <script>
      async function loadMenu() {
        const container = document.getElementById("menu-container");
        try {
          const res = await fetch("http://127.0.0.1:8000/api/menu/");
          if (!res.ok) throw new Error("Помилка сервера");
          const data = await res.json();

          container.innerHTML = data
            .map((item) => {
              const finalImg = item.image
                ? `http://127.0.0.1:8000${item.image}`
                : "https://via.placeholder.com/250";

              return `
              <div class="col-md-4 col-sm-6">
                <div class="menu-card card shadow-sm h-100">
                  <img src="${finalImg}" alt="${item.name}" class="menu-item" />
                  <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold">${item.name}</h5>
                    <p class="card-text text-muted small flex-grow-1">
                      ${item.description || "Класичний напій для вашого настрою."}
                    </p>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                      <span class="fs-5 fw-bold text-success">${item.price} ₴</span>
                      <button class="btn btn-primary btn-sm" onclick="alert('Додано в кошик!')">Додати</button>
                    </div>
                  </div>
                </div>
              </div>`;
            })
            .join("");
        } catch (err) {
          console.error("Помилка завантаження:", err);
          container.innerHTML =
            "<div class='col-12'><p class='text-danger'>Не вдалося завантажити меню. Переконайтеся, що Django сервер запущений.</p></div>";
        }
      }

      window.onload = loadMenu;
    </script>
  </body>
</html>
