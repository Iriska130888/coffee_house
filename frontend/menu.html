<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee House — Меню</title>
    <link href="https://jsdelivr.net" rel="stylesheet" />
    <style>
      .menu-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
        padding: 20px;
      }
      .card-img-top {
        height: 200px;
        object-fit: cover;
      }
    </style>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="#">☕️ COFFEE HOUSE</a>
      </div>
    </nav>

    <div class="container">
      <h2 class="mb-4">Наше меню</h2>
      <div id="menu-container" class="menu-container"></div>
    </div>

    <script>
      async function loadMenu() {
        try {
          const res = await fetch("http://127.0.0.1:8000/api/menu");
          const data = await res.json();
          const container = document.getElementById("menu-container");

          if (!data || data.length === 0) {
            container.innerHTML = "<p>Меню порожнє...</p>";
            return;
          }

          container.innerHTML = data
            .map((item) => {
              const finalImg = item.image
                ? `http://127.0.0.1:8000${item.image}`
                : "https://unsplash.com";

              return `
                        <div class="card shadow-sm h-100">
                            <img src="${finalImg}" class="card-img-top" alt="${item.name}">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title fw-bold">${item.name}</h5>
                                <p class="card-text text-muted small flex-grow-1">
                                    ${item.description || "Класичний напій для вашого настрою."}
                                </p>
                                <div class="d-flex justify-content-between align-items-center mt-3">
                                    <span class="fs-5 fw-bold text-success">${item.price} ₴</span>
                                    <button class="btn btn-primary btn-sm" onclick="alert('Додано в кошик!')">
                                        Додати
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
            })
            .join("");
        } catch (err) {
          console.error("Помилка завантаження меню:", err);
          document.getElementById("menu-container").innerHTML =
            "<p class='text-danger'>Не вдалося завантажити меню. Перевірте, чи запущений Django-сервер.</p>";
        }
      }

      window.onload = loadMenu;
    </script>
  </body>
</html>
